gui:
  showBottomLine: false
  nerdFontsVersion: "3"
os:
  edit: "nvim"
git:
  # 紫のマージ済みPRアイコンが残り続けるのを防ぐ。(OPEN/DRAFT の間は表示される）
  mainBranches:
    - master
    - main
    - develop
    - development
  pagers:
    - pager: delta --dark --paging=never --side-by-side --hyperlinks --line-numbers
      colorArg: always
customCommands:
  - key: "C"
    context: "files"
    description: "Create new commit"
    prompts:
      - type: "menu"
        key: "Type"
        title: "Type of change"
        options:
          - name: "add"
            description: "Add new feature"
            value: "add"
          - name: "fix"
            description: "A bug fix / change feature"
            value: "fix"
          - name: "refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "docs"
            description: "Documentation only changes"
            value: "docs"
          - name: "update"
            description: "Update package, version"
            value: "update"
          - name: "delete"
            description: "Delete package, version"
            value: "delete"
      - type: "input"
        title: "Scope(additional contextual info)"
        key: "Scope"
        initialValue: ""
      - type: "input"
        title: "message"
        key: "Message"
        initialValue: ""
    command: "git commit --message '{{.Form.Type}}({{.Form.Scope}}) {{.Form.Message}}'"
    loadingText: "Creating conventional commit..."

  # ai-commit
  - key: "<c-a>"
    context: "files"
    description: "AI-generated commit message"
    command: "$HOME/.config/lazygit/scripts/ai-commit.sh"
    output: terminal

  # worktree
  - key: "W"
    context: "localBranches"
    description: "Create worktree with gwq"
    prompts:
      - type: "input"
        title: "New branch name (e.g. feature/xxx, fix/yyy)"
        key: "Name"
        initialValue: ""
    command: "gwq add -b {{.Form.Name}}"
    loadingText: "Creating worktree with gwq..."
    output: terminal

  # 選択中のブランチをGitHubで開く（branch / PR をメニューで選択）
  # <c-o> は copyToClipboard 等デフォルトと衝突するため未使用の <c-g>(github) を採用
  - key: "<c-g>"
    context: "localBranches"
    description: "Open selected branch on GitHub (branch / PR)"
    prompts:
      - type: "menu"
        key: "Action"
        title: "Open on GitHub"
        options:
          - name: "branch"
            description: "Open the branch page (gh browse --branch)"
            value: "browse --branch"
          - name: "pr"
            description: "Open the pull request (gh pr view --web)"
            value: "pr view --web"
    command: "gh {{.Form.Action}} {{.SelectedLocalBranch.Name | quote}}"
    loadingText: "Opening on GitHub..."
