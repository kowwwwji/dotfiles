##########################################
# 各種設定
##########################################
# tmux起動時のシェルをzshにする
set -g default-shell /bin/zsh
set-option -g focus-events on

# tmuxを256色表示できるようにする
set -g default-terminal "screen-256color"
set -ga terminal-overrides "xterm-256color:Tc"

# paneの線を強調
set-option -g pane-active-border-style "bg=colour060"
set-option -ag pane-active-border-style "fg=black"

# window index, pane indexを変更
set -g base-index 1
setw -g pane-base-index 1

# マウス操作を有効にする
# iterm側の設定も必要 https://qiita.com/vintersnow/items/2880cc7b63a93a4d1b1d
set -g mouse on
bind -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind -T edit-mode-vi WheelDownPane send-keys -X scroll-down

##########################################
# キー設定
##########################################
# ESCの効きを良くする
set -s escape-time 0

# 拡張キー (Shift+Enter, Ctrl+/ などを区別)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# C-bのキーバインドを解除
unbind C-b
unbind =
# prefixキー（C-Space: JIS/US HHKB で同位置・nvim既定とほぼ非衝突。macOSの入力ソース切替(Ctrl+Space)はOFFにすること）
set -g prefix C-Space
# prefix2度押しで C-Space をそのまま下のアプリ(nvimの補完トリガ等)へ送る
bind C-Space send-prefix

# 設定リロード（config から削除・移動したバインドの掃除も行う）
bind R run-shell "$HOME/.tmux/reload.sh"

# セッションを閉じる（誤操作防止のため確認あり）
bind q confirm-before -p "kill-session #S? (y/n)" kill-session

# タブウインドウを開く
bind t new-window -a -c "#{pane_current_path}"

# windowを閉じる（x=kill-paneと区別。誤操作防止のため確認あり）
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# ウインドウ切り替え（Tab:次 / Shift+Tab:前）
bind Tab next-window
bind BTab previous-window

#### Pane ####
bind \\ display-panes
set -g display-panes-time 10000
set -g display-time 3000

# Enterで現在のペインを最大化
bind Enter resize-pane -Z

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペインのレイアウトを横並び ⇄ 縦並びでトグルする（even の e）
# NOTE: Space は不可（tmux-which-key が後読みで上書きする）
bind e if-shell -F '#{@layout_h}' \
  'set -w @layout_h 0 ; select-layout even-vertical' \
  'set -w @layout_h 1 ; select-layout even-horizontal'

# ペイン縦分割
bind | split-window -h -c "#{pane_current_path}"
bind r split-window -h -c "#{pane_current_path}" \; resize-pane -R 50
# ペイン横分割
bind - split-window -v -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}" \; resize-pane -D 15

#### コピーモードの設定 ####
# コピーモードでvimキーバインドを使う
setw -g mode-keys vi
# Iterm2のKey bindings のScroll One Page Up/Down][ [Page Up/Down] を削除する必要あり
bind -n Pageup copy-mode -u
bind -T copy-mode-vi Escape send-keys -X cancel
# 'v' で選択を始める
bind -T copy-mode-vi v send -X begin-selection
# 'V' で行選択
bind -T copy-mode-vi V send -X select-line
# 'C-v' で矩形選択
bind -T copy-mode-vi C-v send -X rectangle-toggle
# 'y' でヤンク
bind -T copy-mode-vi y send -X copy-selection
# 'Y' で行ヤンク
bind -T copy-mode-vi Y send -X copy-line

#### Popup ####
bind g popup -w95% -h95% -E -d "#{pane_current_path}" lazygit
bind c popup -w95% -h95% -E -d "#{pane_current_path}" lazydocker
bind G popup -w95% -h95% -E -d "#{pane_current_path}" "gh dash"
bind ` popup -w95% -h95% -E -d "#{pane_current_path}" '\
  if [ popup = $(tmux display -p -F "#{session_name}") ]; then \
    tmux detach-client ; \
  else \
    tmux attach -c $(tmux display -p -F "#{pane_current_path}") -t popup || tmux new -s popup ; \
  fi \
'
# popup以外のセッションに移動（通知のあるwindowを行内に表示）
bind s run-shell "$HOME/.scripts/tmux-session-select"
# gwq の worktree を選んで window に移動（無ければ作成）
bind w display-popup -w 80% -h 60% -E "$HOME/.scripts/gwq-window"
# このwindowの無音監視をトグル（15秒出力が無ければ通知）
bind m if-shell -F '#{monitor-silence}' \
  'setw monitor-silence 0 ; display-message "silence monitor OFF"' \
  'setw monitor-silence 15 ; display-message "silence monitor ON (15s)"'

##########################################
# ステータスバー
##########################################
set -g status-position bottom

# Color palette
set-option -g @c-bg "#1c1c1c"
set-option -g @c-fg "#c0c0c0"
set-option -g @c-primary "#5f5f87"
set-option -g @c-info "#00BAFE"
set-option -g @c-info-content "#042E49"
set-option -g @c-silence "#d7af5f"

# INFO: 通知監視
# 今見ていない(バックグラウンドの)windowで通知が起きるとステータスのそのwindowが色付きアイコンに変わる。
# フラグはそのwindowを表示(select)すると自動でクリアされ通常色に戻る。
#   ベル 󱅫(水色)         : window_bell_flag。\a (BEL)が出力された時(Claude Code完了音/エラー音など)
#   サイレント 󰂛(黄)     : window_silence_flag。monitor-silenceは既定OFF。prefix+mでwindow毎にONにすると15秒無出力で発火
# bell-action any = アクティブwindow宛のベルもフラグを立てる(見ている最中のwindowは
#   tmux仕様で即クリアされ得るが、裏のセッションのアクティブwindow宛は残って一覧に出る)
# 注: monitor-activity(出力検知)は意図的にOFF。powerlevel10kがフォーカス切替時に
#     プロンプトを再描画し、何もしていないのに緑(activity)が点く誤検知が多いため。
set -g monitor-bell on
set -g monitor-activity off
set -g bell-action any
set -g visual-bell off
set -g visual-activity off
# bell 発生時にステータスバーを再描画し、他セッション通知(status-right)の表示遅延を縮める
# (#() の再実行は status-interval 間隔でキャッシュされるため、最悪ケースは interval 秒)
set-hook -g alert-bell 'refresh-client -S'

# Status bar
# absolute-centre: 左右の幅を除いた残り空間ではなく端末全体の中央に window 一覧を固定する
# (prefix待ち表示や他セッション通知が右側に出現しても一覧がズレないように)
set -g status-justify absolute-centre
set -g status-interval 10 # 更新頻度(second)
set -g status-style bg="#{@c-bg}",fg="#{@c-fg}"

# Window status - current
set-option -gw window-status-current-format '#[bg=#{@c-primary},fg=#{@c-fg},bold] #I.#W '

# Window status - normal
# 優先度: ベル > サイレント > 通常
set -gw window-status-separator ""
set-option -gw window-status-format '#{?window_bell_flag,#[bg=#{@c-info}]#[fg=#{@c-info-content}] 󱅫 #I.#W ,#{?window_silence_flag,#[bg=#{@c-silence}]#[fg=#{@c-bg}] 󰂛 #I.#W ,#[bg=#{@c-bg}]#[fg=#{@c-fg}] #I.#W }}'

# Left status
set -g status-left-length 100
set -g status-left "#[bg=#{@c-primary},fg=#{@c-fg}] #S #[default]  󰆍 #P #(~/.tmux/git-status.sh '#{pane_current_path}') "

# Right status
set -g status-right-length 100
set -g @prefix_highlight_prefix_prompt 'Waiting Tmux key...'
set -g status-right "#{prefix_highlight}  #(~/.tmux/session-alerts.sh '#{client_session}')#{sysstat_cpu}  #{sysstat_mem}  #(~/.tmux/loadavg.sh) "

##########################################
# tpm_plugins
##########################################
# TPM 自体
set -g @plugin 'tmux-plugins/tpm'

# プラグイン一覧
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'samoshkin/tmux-plugin-sysstat'
set -g @plugin 'alexwforsythe/tmux-which-key'

# auto restore tmux
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10' # 自動保存の間隔(minute)

# load plugins
# <prifix>Ctrl+Uでアップデート、<prifix>Ctrl+Iでインストール
if-shell "[ -x ${HOME}/.tmux/plugins/tpm/tpm ]" "run-shell ${HOME}/.tmux/plugins/tpm/tpm"
